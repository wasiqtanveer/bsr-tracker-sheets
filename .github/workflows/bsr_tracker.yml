name: Daily BSR Tracker

on:
  schedule:
    - cron: '0 8 * * *'  # Runs every day at 8:00 AM UTC
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  run-bsr-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install keepa requests gspread google-auth

      - name: Restore previous BSR data
        run: |
          if [ -f bsr_data.json ]; then
            echo "Previous data found"
          else
            echo "{}" > bsr_data.json
          fi

      - name: Run BSR tracker
        env:
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python bsr_tracker.py

      - name: Save updated BSR data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bsr_data.json
          git diff --staged --quiet || git commit -m "Update BSR data $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push